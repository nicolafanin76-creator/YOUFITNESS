<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouFitness</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --accent: #ff5722;
            --success: #28a745;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
        }

        h1 { 
            color: var(--primary); 
            font-size: 22px; 
            text-align: center; 
            margin: 10px 0 5px 0;
            flex-shrink: 0;
        }

        .nav-days {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 4px;
            background: var(--card-bg);
            padding: 8px;
            margin: 0 10px 10px 10px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .btn-day {
            background: #333;
            color: var(--text-color);
            border: none;
            padding: 6px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            flex: 1 1 auto;
        }

        .btn-day.active {
            background: var(--primary);
            color: #000;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
            padding-bottom: 230px; 
            -webkit-overflow-scrolling: touch;
        }

        .day-content {
            display: none;
        }

        .day-content.active {
            display: block;
        }

        h2 {
            text-align: center;
            font-size: 16px;
            margin: 5px 0 15px 0;
            color: var(--text-muted);
        }

        .macro-gruppo {
            background: #252525;
            color: var(--primary);
            padding: 6px 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .exercise-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid var(--primary);
        }

        .exercise-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .series-table {
            width: 100%;
            border-collapse: collapse;
        }

        .series-table th {
            text-align: left;
            color: var(--text-muted);
            font-size: 11px;
            padding-bottom: 5px;
        }

        .series-table td {
            padding: 5px 2px;
            vertical-align: middle;
        }

        .series-row td:first-child {
            font-weight: bold;
            width: 8%;
        }

        .input-weight, .input-rep-fatte {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 4px;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            -webkit-user-select: text;
            user-select: text;
            box-sizing: border-box;
        }

        .input-weight { width: 55px; }
        .input-rep-fatte { width: 45px; background: #2a3a3a; border-color: #00adb5; }

        .btn-timer {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 4px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
        }

        .cardio-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .cardio-field {
            display: flex;
            flex-direction: column;
            min-width: 0; 
        }

        .cardio-field label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cardio-field input {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 2px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            -webkit-user-select: text;
            user-select: text;
            width: 100%;
            box-sizing: border-box;
        }

        .timer-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #151515;
            border-top: 3px solid var(--primary);
            padding: 12px 15px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.7);
            z-index: 100;
            box-sizing: border-box;
        }

        .timer-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .timer-text {
            font-size: 34px;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }

        .timer-info {
            font-size: 13px;
            color: #fff;
            font-weight: bold;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-stop-timer {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .custom-timer-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .custom-timer-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
        }

        .custom-timer-select {
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            outline: none;
        }

        .btn-start-custom {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        .btn-action-save {
            background: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 25px 0 10px 0;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .select-exercise-chart {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            outline: none;
        }

        .chart-container {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .history-card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
            margin: 12px 0;
            border-left: 4px solid var(--success);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            margin-bottom: 8px;
        }

        .history-item-details {
            font-size: 13px;
            color: #ddd;
            line-height: 1.5;
        }

        .btn-danger-clear {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>YOUFITNESS</h1>

        <div class="nav-days">
            <button class="btn-day active" id="nav-btn-1" onclick="switchDay('1')">DAY 1</button>
            <button class="btn-day" id="nav-btn-2" onclick="switchDay('2')">DAY 2</button>
            <button class="btn-day" id="nav-btn-3" onclick="switchDay('3')">DAY 3</button>
            <button class="btn-day" id="nav-btn-4" onclick="switchDay('4')">DAY 4</button>
            <button class="btn-day" id="nav-btn-storico" onclick="switchDay('storico')">STORICO</button>
            <button class="btn-day" id="nav-btn-grafici" onclick="switchDay('grafici')">GRAFICI</button>
        </div>

        <div class="scrollable-content" id="workout-container"></div>
    </div>

    <div class="timer-overlay" id="global-timer-bar">
        <div class="timer-row-top" id="timer-display-status" style="display: none;">
            <div>
                <div class="timer-info" id="timer-label">Recupero...</div>
                <div class="timer-text" id="timer-countdown">00s</div>
            </div>
            <button class="btn-stop-timer" onclick="stopGlobalTimer()">SALTA</button>
        </div>
        
        <div class="custom-timer-control">
            <span class="custom-timer-label">TIMER LIBERO:</span>
            <select id="custom-seconds-select" class="custom-timer-select">
            </select>
            <button class="btn-start-custom" onclick="startCustomTimer()">AVVIA</button>
        </div>
    </div>

    <script>
        // Numero di versione per forzare l'auto-aggiornamento della cache
        const APP_VERSION = "4.2";

        const workoutData = {
            1: {
                title: "ADDOMINALI - PETTO - SPALLE - BICIPITI",
                exercises: [
                    { name: "HANGING LEG RAISES", group: "ADDOMINALI", series: 3, rep: "15", rec: 90 },
                    { name: "SPINTE CON BILANCERE SMITH MACHINE PANCA PIANA", group: "PETTO", series: 3, rep: "8/10", rec: 90 },
                    { name: "SPINTE CON MANUBRI PANCA INCLINATA", group: "PETTO", series: 3, rep: "8/10", rec: 90 },
                    { name: "CROCI AI CAVI ALTI", group: "PETTO", series: 3, rep: "8/10", rec: 90 },
                    { name: "ALZATE LATERALI CON MANUBRI", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "MILITARY PRESS SMITH MACHINE", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "MACHINE REVERSE FLY", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL ALTERNATO PANCA INCLINATA", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL BILANCERE A Z PANCA SCOTT", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL HAMMER AI CAVI BASSI CON CORDA", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 }
                ],
                cardio: [
                    { name: "CLIMBING", defaultMin: "10" },
                    { name: "WALKING", defaultMin: "15" }
                ]
            },
            2: {
                title: "ADDOMINALI - SCHIENA - TRICIPITI - AVAMBRACCIO",
                exercises: [
                    { name: "ADDOMINAL MACHINE", group: "ADDOMINALI", series: 3, rep: "15", rec: 90 },
                    { name: "LAT MACHINE AVANTI PRESA LARGA", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "REMATORE AL CAVO PRESA STRETTA", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "RACK PULL", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "LOW ROW MACHINE HAMMER", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "HIPEREXTENSION", group: "SCHIENA", series: 3, rep: "15", rec: 90 },
                    { name: "FRENCH PRESS CAVO BASSO", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "FRENCH PRESS CON BILANCERE A Z SU PANCA PIANA", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "PUSH DOWN CAVO ALTO", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL INVERSO CON BILANCERE SU PANCA", group: "AVAMBRACCIO", series: 3, rep: "10", rec: 90 }
                ],
                cardio: [
                    { name: "CLIMBING", defaultMin: "10" },
                    { name: "WALKING", defaultMin: "15" }
                ]
            },
            3: {
                title: "ADDOMINALI - GAMBE",
                exercises: [
                    { name: "PLANK", group: "ADDOMINALI", series: 3, rep: "60\"", rec: 60 },
                    { name: "ADDUTTORI", group: "QUADRICIPITI", series: 3, rep: "12", rec: 90 },
                    { name: "ABDUTTORI", group: "QUADRICIPITI", series: 3, rep: "12", rec: 90 },
                    { name: "LEG EXTENSION", group: "QUADRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "LEG PRESS 45", group: "QUADRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "PENDULUM SQUAT MACHINE", group: "QUADRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "AFFONDI ALTERNATI CON MANUBRI", group: "QUADRICIPITI", series: 3, rep: "15", rec: 90 },
                    { name: "CALF PRESSA", group: "POLPACCI", series: 3, rep: "10", rec: 90 },
                    { name: "CALF SINGOLO IN PIEDI CON MANUBRIO", group: "POLPACCI", series: 3, rep: "10", rec: 90 }
                ],
                cardio: [
                    { name: "WALKING", defaultMin: "20" }
                ]
            },
            4: {
                title: "ADDOMINALI - PETTO - SPALLE - MIX",
                exercises: [
                    { name: "PLANK LATERALE", group: "ADDOMINALI", series: 3, rep: "45\"", rec: 60 },
                    { name: "CROCI CON MANUBRI PANCA INCLINATA", group: "PETTO", series: 3, rep: "8-10", rec: 90 },
                    { name: "FLESSIONI A TERRA", group: "PETTO", series: 3, rep: "20", rec: 90 },
                    { name: "ARNOLD PRESS DA SEDUTI CON MANUBRI", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "ALZATE POSTERIORI SU PANCA INCLINATA CON MANUBRI", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL AI CAVI ALTI", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "TRAZIONI ALLA SBARRA", group: "DORSALI", series: 3, rep: "6/8", rec: 90 },
                    { name: "FRENCH PRESS CAVO BASSO CON PANCA", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 }
                ],
                cardio: [
                    { name: "CLIMBING", defaultMin: "5" },
                    { name: "WALKING", defaultMin: "15", defaultPendenza: "7" }
                ]
            }
        };

        let timerInterval = null;
        let audioCtx = null;
        let fitnessChart = null;

        function checkCacheUpdate() {
            const currentSavedVersion = localStorage.getItem("youfitness_version");
            if (currentSavedVersion !== APP_VERSION) {
                localStorage.setItem("youfitness_version", APP_VERSION);
                window.location.reload(true);
            }
        }

        function playBeep() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                setTimeout(() => { osc.stop(); }, 200);
            } catch (e) { console.log(e); }
        }

        function setupCustomTimerOptions() {
            const select = document.getElementById('custom-seconds-select');
            if (!select) return;
            select.innerHTML = "";
            for (let totalSec = 5; totalSec <= 300; totalSec += 5) {
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                const label = min > 0 ? min + "m " + sec + "s" : sec + "s";
                const opt = document.createElement('option');
                opt.value = totalSec;
                opt.innerText = label;
                if(totalSec === 90) opt.selected = true; 
                select.appendChild(opt);
            }
        }

        function generateApp() {
            checkCacheUpdate();
            const container = document.getElementById('workout-container');
            container.innerHTML = "";
            setupCustomTimerOptions();
            
            for (let dayId in workoutData) {
                const dayData = workoutData[dayId];
                const dayDiv = document.createElement('div');
                dayDiv.id = "day-" + dayId;
                dayDiv.className = "day-content " + (dayId == "1" ? 'active' : '');

                let currentGroup = "";
                let html = "<h2>" + dayData.title + "</h2>";

                dayData.exercises.forEach((ex, exIndex) => {
                    if (ex.group !== currentGroup) {
                        currentGroup = ex.group;
                        html += "<div class='macro-gruppo'>" + currentGroup + "</div>";
                    }

                    html += `
                    <div class="exercise-card">
                        <div class="exercise-name">${ex.name}</div>
                        <table class="series-table">
                            <thead>
                                <tr>
                                    <th>S.</th>
                                    <th>Target</th>
                                    <th>Fatte</th>
                                    <th>Kg</th>
                                    <th>Rec</th>
                                </tr>
                            </thead>
                            <tbody>`;

                    for (let s = 1; s <= ex.series; s++) {
                        const inputWeightId = "w_" + dayId + "_" + exIndex + "_" + s + "_kg";
                        const inputRepId = "w_" + dayId + "_" + exIndex + "_" + s + "_rep";
                        html += `
                                <tr class="series-row">
                                    <td>${s}</td>
                                    <td><span style="color: var(--text-muted); font-size:12px; font-weight:bold;">${ex.rep}</span></td>
                                    <td>
                                        <input type="text" inputmode="numeric" pattern="[0-9]*" id="${inputRepId}" class="input-rep-fatte" placeholder="-" oninput="saveData('${inputRepId}', this.value)">
                                    </td>
