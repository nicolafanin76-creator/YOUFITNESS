<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouFitness</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --accent: #ff5722;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
        }

        h1 { 
            color: var(--primary); 
            font-size: 22px; 
            text-align: center; 
            margin: 10px 0 5px 0;
            flex-shrink: 0;
        }

        .nav-days {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 6px;
            background: var(--card-bg);
            padding: 10px;
            margin: 0 10px 10px 10px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .btn-day {
            background: #333;
            color: var(--text-color);
            border: none;
            padding: 7px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            flex: 1 1 auto;
        }

        .btn-day.active {
            background: var(--primary);
            color: #000;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
            padding-bottom: 210px; 
            -webkit-overflow-scrolling: touch;
        }

        .day-content {
            display: none;
        }

        .day-content.active {
            display: block;
        }

        h2 {
            text-align: center;
            font-size: 16px;
            margin: 5px 0 15px 0;
            color: var(--text-muted);
        }

        .macro-gruppo {
            background: #252525;
            color: var(--primary);
            padding: 6px 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .exercise-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid var(--primary);
        }

        .exercise-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .series-table {
            width: 100%;
            border-collapse: collapse;
        }

        .series-table th {
            text-align: left;
            color: var(--text-muted);
            font-size: 11px;
            padding-bottom: 5px;
        }

        .series-table td {
            padding: 5px 2px;
            vertical-align: middle;
        }

        .series-row td:first-child {
            font-weight: bold;
            width: 8%;
        }

        .input-weight, .input-rep-fatte {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 4px;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            -webkit-user-select: text;
            user-select: text;
            box-sizing: border-box;
        }

        .input-weight { width: 55px; }
        .input-rep-fatte { width: 45px; background: #2a3a3a; border-color: #00adb5; }

        .btn-timer {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 4px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
        }

        .cardio-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .cardio-field {
            display: flex;
            flex-direction: column;
            min-width: 0; 
        }

        .cardio-field label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cardio-field input {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 2px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            -webkit-user-select: text;
            user-select: text;
            width: 100%;
            box-sizing: border-box;
        }

        .cardio-field input:read-only {
            opacity: 0.7;
            background: #2a2a2a;
        }

        .cardio-field .btn-timer {
            height: 100%;
        }

        .timer-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #151515;
            border-top: 3px solid var(--primary);
            padding: 12px 15px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.7);
            z-index: 100;
            box-sizing: border-box;
        }

        .timer-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .timer-text {
            font-size: 34px;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }

        .timer-info {
            font-size: 13px;
            color: #fff;
            font-weight: bold;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-stop-timer {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
