<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouFitness</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --accent: #ff5722;
            --success: #28a745;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
        }

        h1 { 
            color: var(--primary); 
            font-size: 22px; 
            text-align: center; 
            margin: 10px 0 5px 0;
            flex-shrink: 0;
        }

        .nav-days {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 4px;
            background: var(--card-bg);
            padding: 8px;
            margin: 0 10px 10px 10px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .btn-day {
            background: #333;
            color: var(--text-color);
            border: none;
            padding: 6px 8px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            flex: 1 1 auto;
        }

        .btn-day.active {
            background: var(--primary);
            color: #000;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
            padding-bottom: 210px; 
            -webkit-overflow-scrolling: touch;
        }

        .day-content {
            display: none;
        }

        .day-content.active {
            display: block;
        }

        h2 {
            text-align: center;
            font-size: 16px;
            margin: 5px 0 15px 0;
            color: var(--text-muted);
        }

        .macro-gruppo {
            background: #252525;
            color: var(--primary);
            padding: 6px 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .exercise-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid var(--primary);
        }

        .exercise-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .series-table {
            width: 100%;
            border-collapse: collapse;
        }

        .series-table th {
            text-align: left;
            color: var(--text-muted);
            font-size: 11px;
            padding-bottom: 5px;
        }

        .series-table td {
            padding: 5px 2px;
            vertical-align: middle;
        }

        .series-row td:first-child {
            font-weight: bold;
            width: 8%;
        }

        .input-weight, .input-rep-fatte {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 4px;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            -webkit-user-select: text;
            user-select: text;
            box-sizing: border-box;
        }

        .input-weight { width: 55px; }
        .input-rep-fatte { width: 45px; background: #2a3a3a; border-color: #00adb5; }

        .btn-timer {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 4px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            width: 100%;
        }

        .cardio-inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .cardio-field {
            display: flex;
            flex-direction: column;
            min-width: 0; 
        }

        .cardio-field label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cardio-field input {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 2px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            -webkit-user-select: text;
            user-select: text;
            width: 100%;
            box-sizing: border-box;
        }

        .timer-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #151515;
            border-top: 3px solid var(--primary);
            padding: 12px 15px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.7);
            z-index: 100;
            box-sizing: border-box;
        }

        .timer-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .timer-text {
            font-size: 34px;
            font-weight: 900;
            color: var(--primary);
            line-height: 1;
        }

        .timer-info {
            font-size: 13px;
            color: #fff;
            font-weight: bold;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-stop-timer {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .custom-timer-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .custom-timer-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
        }

        .custom-timer-select {
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            outline: none;
        }

        .btn-start-custom {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        /* Pulsante Salva Allenamento */
        .btn-action-save {
            background: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
            text-transform: uppercase;
        }

        /* Grafici e Storico */
        .select-exercise-chart {
            width: 100%;
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .history-card {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid var(--success);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            margin-bottom: 6px;
        }

        .history-item-details {
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
        }

        .btn-danger-clear {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <h1>YOUFITNESS</h1>

        <div class="nav-days">
            <button class="btn-day active" id="nav-btn-1" onclick="switchDay('1')">DAY 1</button>
            <button class="btn-day" id="nav-btn-2" onclick="switchDay('2')">DAY 2</button>
            <button class="btn-day" id="nav-btn-3" onclick="switchDay('3')">DAY 3</button>
            <button class="btn-day" id="nav-btn-4" onclick="switchDay('4')">DAY 4</button>
            <button class="btn-day" id="nav-btn-storico" onclick="switchDay('storico')">STORICO</button>
            <button class="btn-day" id="nav-btn-grafici" onclick="switchDay('grafici')">GRAFICI</button>
        </div>

        <div class="scrollable-content" id="workout-container"></div>
    </div>

    <div class="timer-overlay" id="global-timer-bar">
        <div class="timer-row-top" id="timer-display-status" style="display: none;">
            <div>
                <div class="timer-info" id="timer-label">Recupero...</div>
                <div class="timer-text" id="timer-countdown">00s</div>
            </div>
            <button class="btn-stop-timer" onclick="stopGlobalTimer()">SALTA</button>
        </div>
        
        <div class="custom-timer-control">
            <span class="custom-timer-label">TIMER LIBERO:</span>
            <select id="custom-seconds-select" class="custom-timer-select">
            </select>
            <button class="btn-start-custom" onclick="startCustomTimer()">AVVIA</button>
        </div>
    </div>

    <script>
        const workoutData = {
            1: {
                title: "ADDOMINALI - PETTO - SPALLE - BICIPITI",
                exercises: [
                    { name: "HANGING LEG RAISES", group: "ADDOMINALI", series: 3, rep: "15", rec: 90 },
                    { name: "SPINTE CON BILANCERE SMITH MACHINE PANCA PIANA", group: "PETTO", series: 3, rep: "8/10", rec: 90 },
                    { name: "SPINTE CON MANUBRI PANCA INCLINATA", group: "PETTO", series: 3, rep: "8/10", rec: 90 },
                    { name: "CROCI AI CAVI ALTI", group: "PETTO", series: 3, rep: "8/10", rec: 90 },
                    { name: "ALZATE LATERALI CON MANUBRI", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "MILITARY PRESS SMITH MACHINE", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "MACHINE REVERSE FLY", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL ALTERNATO PANCA INCLINATA", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL BILANCERE A Z PANCA SCOTT", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL HAMMER AI CAVI BASSI CON CORDA", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 }
                ],
                cardio: [
                    { name: "CLIMBING", defaultMin: "10" },
                    { name: "WALKING", defaultMin: "15" }
                ]
            },
            2: {
                title: "ADDOMINALI - SCHIENA - TRICIPITI - AVAMBRACCIO",
                exercises: [
                    { name: "ADDOMINAL MACHINE", group: "ADDOMINALI", series: 3, rep: "15", rec: 90 },
                    { name: "LAT MACHINE AVANTI PRESA LARGA", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "REMATORE AL CAVO PRESA STRETTA", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "RACK PULL", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "LOW ROW MACHINE HAMMER", group: "SCHIENA", series: 3, rep: "8/10", rec: 90 },
                    { name: "HIPEREXTENSION", group: "SCHIENA", series: 3, rep: "15", rec: 90 },
                    { name: "FRENCH PRESS CAVO BASSO", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "FRENCH PRESS CON BILANCERE A Z SU PANCA PIANA", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "PUSH DOWN CAVO ALTO", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL INVERSO CON BILANCERE SU PANCA", group: "AVAMBRACCIO", series: 3, rep: "10", rec: 90 }
                ],
                cardio: [
                    { name: "CLIMBING", defaultMin: "10" },
                    { name: "WALKING", defaultMin: "15" }
                ]
            },
            3: {
                title: "ADDOMINALI - GAMBE",
                exercises: [
                    { name: "PLANK", group: "ADDOMINALI", series: 3, rep: "60\"", rec: 60 },
                    { name: "ADDUTTORI", group: "QUADRICIPITI", series: 3, rep: "12", rec: 90 },
                    { name: "ABDUTTORI", group: "QUADRICIPITI", series: 3, rep: "12", rec: 90 },
                    { name: "LEG EXTENSION", group: "QUADRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "LEG PRESS 45", group: "QUADRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "PENDULUM SQUAT MACHINE", group: "QUADRICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "AFFONDI ALTERNATI CON MANUBRI", group: "QUADRICIPITI", series: 3, rep: "15", rec: 90 },
                    { name: "CALF PRESSA", group: "POLPACCI", series: 3, rep: "10", rec: 90 },
                    { name: "CALF SINGOLO IN PIEDI CON MANUBRIO", group: "POLPACCI", series: 3, rep: "10", rec: 90 }
                ],
                cardio: [
                    { name: "WALKING", defaultMin: "20" }
                ]
            },
            4: {
                title: "ADDOMINALI - PETTO - SPALLE - MIX",
                exercises: [
                    { name: "PLANK LATERALE", group: "ADDOMINALI", series: 3, rep: "45\"", rec: 60 },
                    { name: "CROCI CON MANUBRI PANCA INCLINATA", group: "PETTO", series: 3, rep: "8-10", rec: 90 },
                    { name: "FLESSIONI A TERRA", group: "PETTO", series: 3, rep: "20", rec: 90 },
                    { name: "ARNOLD PRESS DA SEDUTI CON MANUBRI", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "ALZATE POSTERIORI SU PANCA INCLINATA CON MANUBRI", group: "SPALLE", series: 3, rep: "8/10", rec: 90 },
                    { name: "CURL AI CAVI ALTI", group: "BICIPITI", series: 3, rep: "8/10", rec: 90 },
                    { name: "TRAZIONI ALLA SBARRA", group: "DORSALI", series: 3, rep: "6/8", rec: 90 },
                    { name: "FRENCH PRESS CAVO BASSO CON PANCA", group: "TRICIPITI", series: 3, rep: "8/10", rec: 90 }
                ],
                cardio: [
                    { name: "CLIMBING", defaultMin: "5" },
                    { name: "WALKING", defaultMin: "15", defaultPendenza: "7" }
                ]
            }
        };

        let timerInterval = null;
        let audioCtx = null;
        let fitnessChart = null;

        function playBeep() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                setTimeout(() => { osc.stop(); }, 200);
            } catch (e) { console.log(e); }
        }

        function setupCustomTimerOptions() {
            const select = document.getElementById('custom-seconds-select');
            if (!select) return;
            select.innerHTML = "";
            for (let totalSec = 5; totalSec <= 300; totalSec += 5) {
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                const label = min > 0 ? min + "m " + sec + "s" : sec + "s";
                const opt = document.createElement('option');
                opt.value = totalSec;
                opt.innerText = label;
                if(totalSec === 90) opt.selected = true; 
                select.appendChild(opt);
            }
        }

        function generateApp() {
            const container = document.getElementById('workout-container');
            container.innerHTML = "";
            setupCustomTimerOptions();
            
            // Genera i 4 allenamenti
            for (let dayId in workoutData) {
                const dayData = workoutData[dayId];
                const dayDiv = document.createElement('div');
                dayDiv.id = "day-" + dayId;
                dayDiv.className = "day-content " + (dayId == "1" ? 'active' : '');

                let currentGroup = "";
                let html = "<h2>" + dayData.title + "</h2>";

                dayData.exercises.forEach((ex, exIndex) => {
                    if (ex.group !== currentGroup) {
                        currentGroup = ex.group;
                        html += "<div class='macro-gruppo'>" + currentGroup + "</div>";
                    }

                    html += `
                    <div class="exercise-card">
                        <div class="exercise-name">${ex.name}</div>
                        <table class="series-table">
                            <thead>
                                <tr>
                                    <th>S.</th>
                                    <th>Target</th>
                                    <th>Fatte</th>
                                    <th>Kg</th>
                                    <th>Rec</th>
                                </tr>
                            </thead>
                            <tbody>`;

                    for (let s = 1; s <= ex.series; s++) {
                        const inputWeightId = "w_" + dayId + "_" + exIndex + "_" + s + "_kg";
                        const inputRepId = "w_" + dayId + "_" + exIndex + "_" + s + "_rep";
                        html += `
                                <tr class="series-row">
                                    <td>${s}</td>
                                    <td><span style="color: var(--text-muted); font-size:12px; font-weight:bold;">${ex.rep}</span></td>
                                    <td>
                                        <input type="text" inputmode="numeric" pattern="[0-9]*" id="${inputRepId}" class="input-rep-fatte" placeholder="-" oninput="saveData('${inputRepId}', this.value)">
                                    </td>
                                    <td>
                                        <input type="text" inputmode="decimal" id="${inputWeightId}" class="input-weight" placeholder="--" oninput="saveData('${inputWeightId}', this.value)">
                                    </td>
                                    <td>
                                        <button class="btn-timer" onclick="startGlobalTimer(${ex.rec}, '${ex.name.replace(/'/g, "\\'")} - S.${s}')">${ex.rec}s</button>
                                    </td>
                                </tr>`;
                    }

                    html += `</tbody></table></div>`;
                });

                html += `<div class="macro-gruppo">CARDIO</div>`;
                dayData.cardio.forEach((c, cIndex) => {
                    const minId = "c_" + dayId + "_" + cIndex + "_min";
                    const pendId = "c_" + dayId + "_" + cIndex + "_pend";
                    const velId = "c_" + dayId + "_" + cIndex + "_vel";
                    const distId = "c_" + dayId + "_" + cIndex + "_dist";
                    
                    html += `
                    <div class="exercise-card" style="border-left-color: var(--accent);">
                        <div class="exercise-name">${c.name}</div>
                        <div class="cardio-inputs">
                            <div class="cardio-field">
                                <label>Minuti</label>
                                <input type="number" id="${minId}" placeholder="${c.defaultMin}" min="5" max="60" step="5" oninput="saveData('${minId}', this.value)">
                            </div>
                            <div class="cardio-field">
                                <label>Pendenza %</label>
                                <input type="text" id="${pendId}" oninput="saveData('${pendId}', this.value)">
                            </div>
                            <div class="cardio-field">
                                <label>Velocità</label>
                                <input type="text" id="${velId}" placeholder="km/h" oninput="saveData('${velId}', this.value)">
                            </div>
                        </div>
                        <div class="cardio-inputs" style="margin-top:6px;">
                            <div class="cardio-field" style="grid-column: span 3;">
                                <label>Distanza Km</label>
                                <input type="text" id="${distId}" placeholder="0.00" oninput="saveData('${distId}', this.value)">
                            </div>
                        </div>
                    </div>`;
                });

                // Tasto per salvare la sessione nello Storico
                html += `<button class="btn-action-save" onclick="logWorkoutSession('${dayId}')">Salva Allenamento di Oggi</button>`;

                dayDiv.innerHTML = html;
                container.appendChild(dayDiv);
            }

            // Schermata Storico
            const storicoDiv = document.createElement('div');
            storicoDiv.id = "day-storico";
            storicoDiv.className = "day-content";
            storicoDiv.innerHTML = `<h2>Storico Allenamenti Effettuati</h2><div id="history-render-zone"></div><button class="btn-danger-clear" onclick="clearFullHistory()">Cancella Tutto lo Storico</button>`;
            container.appendChild(storicoDiv);

            // Schermata Grafici
            const graficiDiv = document.createElement('div');
            graficiDiv.id = "day-grafici";
            graficiDiv.className = "day-content";
            
            let selectHtml = `<select id="chart-exercise-picker" class="select-exercise-chart" onchange="renderExerciseChart()">
                                <option value="">-- Seleziona un Esercizio --</option>`;
            for(let d in workoutData){
                workoutData[d].exercises.forEach(e => {
                    selectHtml += `<option value="${e.name}">${e.name} (${workoutData[d].title.split(" - ")[0]})</option>`;
                });
            }
            selectHtml += `</select>`;
            
            graficiDiv.innerHTML = `<h2>Andamento nel Tempo (Kg massimi)</h2>${selectHtml}<div class="chart-container"><canvas id="workoutTrendChart"></canvas></div>`;
            container.appendChild(graficiDiv);

            loadSavedData();
            renderHistoryZone();
        }

        function switchDay(dayId) {
            document.querySelectorAll('.day-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.btn-day').forEach(el => el.classList.remove('active'));
            
            const targetContent = document.getElementById("day-" + dayId);
            if(targetContent) targetContent.classList.add('active');
            
            const targetBtn = document.getElementById("nav-btn-" + dayId);
            if(targetBtn) targetBtn.classList.add('active');
            
            document.getElementById('workout-container').scrollTop = 0;
            
            if(dayId === 'storico') renderHistoryZone();
            if(dayId === 'grafici') renderExerciseChart();
        }

        function saveData(id, value) {
            localStorage.setItem("youfitness_" + id, value);
        }

        function loadSavedData() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                const savedValue = localStorage.getItem("youfitness_" + input.id);
                if (savedValue !== null) {
                    input.value = savedValue;
                }
            });
        }

        // FUNZIONE PER ARCHIVIARE L'ALLENAMENTO
        function logWorkoutSession(dayId) {
            const history = JSON.parse(localStorage.getItem("youfitness_history") || "[]");
            const dateStr = new Date().toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
            
            const sessionData = {
                date: dateStr,
                timestamp: Date.now(),
                dayName: "DAY " + dayId,
                exercises: []
            };

            workoutData[dayId].exercises.forEach((ex, exIndex) => {
                const exRecord = { name: ex.name, series: [] };
                for (let s = 1; s <= ex.series; s++) {
                    const wVal = localStorage.getItem(`youfitness_w_${dayId}_${exIndex}_${s}_kg`) || "--";
                    const rVal = localStorage.getItem(`youfitness_w_${dayId}_${exIndex}_${s}_rep`) || "--";
                    exRecord.series.push({ s: s, kg: wVal, rep: rVal });
                }
                sessionData.exercises.push(exRecord);
            });

            history.unshift(sessionData); // Mette il più recente all'inizio
            localStorage.setItem("youfitness_history", JSON.stringify(history));
            alert("Allenamento salvato correttamente nello storico!");
            renderHistoryZone();
        }

        // DISEGNA LA LISTA DEGLI ALLENAMENTI SALVATI
        function renderHistoryZone() {
            const zone = document.getElementById("history-render-zone");
            if (!zone) return;
            const history = JSON.parse(localStorage.getItem("youfitness_history") || "[]");
            
            if (history.length === 0) {
                zone.innerHTML = "<p style='text-align:center;color:var(--text-muted);'>Nessun allenamento salvato nello storico.</p>";
                return;
            }

            let html = "";
            history.forEach(session => {
                html += `<div class="history-card">
                            <div class="history-header">
                                <span>${session.dayName}</span>
                                <span style="color:var(--primary);">${session.date}</span>
                            </div>
                            <div class="history-item-details">`;
                session.exercises.forEach(ex => {
                    let seriesText = [];
                    ex.series.forEach(s => {
                        if(s.kg !== "--" || s.rep !== "--") {
                            seriesText.push(`S.${s.s}: ${s.kg}Kg x ${s.rep}R`);
                        }
                    });
                    if(seriesText.length > 0) {
                        html += `<strong>${ex.name}</strong><br><span style="color:#aaa; font-size:12px;">${seriesText.join(" | ")}</span><br>`;
                    }
                });
                html += `</div></div>`;
            });
            zone.innerHTML = html;
        }

        // GENERA IL GRAFICO DELLA LINEA DEL TEMPO
        function renderExerciseChart() {
            const picker = document.getElementById("chart-exercise-picker");
            const canvas = document.getElementById("workoutTrendChart");
            if (!picker || !canvas) return;
            
            const exName = picker.value;
            if (!exName) {
                if(fitnessChart) fitnessChart.destroy();
                return;
            }

            const history = JSON.parse(localStorage.getItem("youfitness_history") || "[]").reverse(); // Ordina dal più vecchio al più recente
            
            const labels = [];
            const dataPoints = [];

            history.forEach(session => {
                session.exercises.forEach(ex => {
                    if (ex.name === exName) {
                        let maxKg = 0;
                        ex.series.forEach(s => {
                            const val = parseFloat(s.kg);
                            if (!isNaN(val) && val > maxKg) {
                                maxKg = val;
                            }
                        });
                        if (maxKg > 0) {
                            labels.push(session.date.split(",")[0]); // Solo la data senza l'ora
                            dataPoints.push(maxKg);
                        }
                    }
                });
            });

            if (fitnessChart) fitnessChart.destroy();

            fitnessChart = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Max Kg Sollevati',
                        data: dataPoints,
                        borderColor: '#00adb5',
                        backgroundColor: 'rgba(0, 173, 181, 0.2)',
                        borderWidth: 3,
                        tension: 0.2,
                        pointRadius: 5,
                        pointBackgroundColor: '#ff5722'
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { grid: { color: '#333' }, ticks: { color: '#fff' } },
                        x: { grid: { color: '#333' }, ticks: { color: '#fff' } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function clearFullHistory() {
            if(confirm("Sei sicuro di voler cancellare TUTTA la cronologia e i grafici per sempre?")) {
                localStorage.removeItem("youfitness_history");
                renderHistoryZone();
                if(fitnessChart) fitnessChart.destroy();
            }
        }

        function startGlobalTimer(seconds, label) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            clearInterval(timerInterval);
            const timerStatusDiv = document.getElementById('timer-display-status');
            const timerCountdown = document.getElementById('timer-countdown');
            const timerLabel = document.getElementById('timer-label');

            timerLabel.innerText = label;
            timerStatusDiv.style.display = 'flex';

            let timeLeft = seconds;
            timerCountdown.innerText = formatTimeDisplay(timeLeft);

            timerInterval = setInterval(() => {
                timeLeft--;
                timerCountdown.innerText = formatTimeDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerCountdown.innerText = "FINE!";
                    playBeep(); 
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    setTimeout(() => { timerStatusDiv.style.display = 'none'; }, 2500);
                }
            }, 1000);
        }

        function startCustomTimer() {
            const select = document.getElementById('custom-seconds-select');
            if(!select) return;
            startGlobalTimer(parseInt(select.value, 10), "Timer Libero Manuale");
        }

        function formatTimeDisplay(totalSeconds) {
            const min = Math.floor(totalSeconds / 60);
            const sec = totalSeconds % 60;
            return min > 0 ? min + "m " + sec + "s" : sec + "s";
        }

        function stopGlobalTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer-display-status').style.display = 'none';
        }

        window.onload = generateApp;
    </script>
</body>
</html>
