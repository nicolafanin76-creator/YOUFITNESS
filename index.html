<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YouFitness</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --accent: #ff5722;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top);
        }

        h1 { 
            color: var(--primary); 
            font-size: 22px; 
            text-align: center; 
            margin: 10px 0 5px 0;
            flex-shrink: 0;
        }

        .nav-days {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            padding: 10px;
            margin: 0 10px 10px 10px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .btn-day {
            background: #333;
            color: var(--text-color);
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-day.active {
            background: var(--primary);
            color: #000;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px;
            padding-bottom: 210px; 
            -webkit-overflow-scrolling: touch;
        }

        .day-content {
            display: none;
        }

        .day-content.active {
            display: block;
        }

        h2 {
            text-align: center;
            font-size: 16px;
            margin: 5px 0 15px 0;
            color: var(--text-muted);
        }

        .macro-gruppo {
            background: #252525;
            color: var(--primary);
            padding: 6px 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }
